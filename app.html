<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>内部加密通讯软件下载</title>
    <style>
        :root {
            --primary-color: #4e54c8;
            --secondary-color: #8f94fb;
            --text-color: #333;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* 背景动态气泡 */
        .circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .circles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* 主卡片容器 */
        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        /* 图标样式与动画 */
        .app-icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .app-icon {
            width: 100%;
            height: 100%;
            border-radius: 22px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .rating {
            color: #FFD700;
            font-size: 18px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 文件信息列表 */
        .file-info {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            font-weight: 600;
            color: #333;
        }

        /* 下载按钮 */
        .download-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(78, 84, 200, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(78, 84, 200, 0.4);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        /* 按钮光效动画 */
        .download-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        /* 微信/QQ 遮罩层 */
        .weixin-tip {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
            text-align: right;
        }

        .weixin-tip img {
            max-width: 90%;
            margin-top: 20px;
            margin-right: 20px;
            animation: bounceIn 0.5s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.1); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }

        /* 简单的 SVG 绘制箭头用于提示 */
        .tip-svg {
            position: absolute;
            top: 10px;
            right: 20px;
            width: 100px;
            fill: white;
            animation: moveUp 1s infinite alternate;
        }
        
        @keyframes moveUp {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

    </style>
</head>
<body>

    <!-- 背景动画元素 -->
    <ul class="circles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <!-- 主内容卡片 -->
    <div class="container">
        <div class="app-icon-wrapper">
            <img src="https://chat-uqewhjj.cdn.7caiyun.com/ic_launcher.png" alt="App Icon" class="app-icon">
        </div>

        <h1>内部加密通讯软件</h1>
        
        <div class="rating">
            ★★★★★ <span style="font-size: 14px; color: #666; vertical-align: middle;">5.0</span>
        </div>

        <div class="file-info">
            <div class="info-row">
                <span class="info-label">文件名称</span>
                <span class="info-value">app-release.apk</span>
            </div>
            <div class="info-row">
                <span class="info-label">文件大小</span>
                <span class="info-value">11.2 MB</span>
            </div>
            <div class="info-row">
                <span class="info-label">文件类型</span>
                <span class="info-value">Android 安装包</span>
            </div>
            <div class="info-row">
                <span class="info-label">上传时间</span>
                <span class="info-value">2026-04-14 21:17:08</span>
            </div>
        </div>

        <a href="https://chat-uqewhjj.cdn.7caiyun.com/app-release.apk" class="download-btn" id="dlBtn">
            立即下载
        </a>
    </div>

    <!-- 微信/QQ 引导遮罩 -->
    <div class="weixin-tip" id="weixinTip">
        <!-- 使用SVG绘制一个简单的指引图，避免依赖外部图片链接失效 -->
        <svg class="tip-svg" viewBox="0 0 100 100">
            <path d="M50 80 L50 20 M30 40 L50 20 L70 40" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="50" cy="15" r="5" fill="white"/>
        </svg>
        <div style="color: white; margin-top: 80px; margin-right: 30px; font-size: 18px; font-weight: bold; text-align: right;">
            <p>点击右上角 <span style="color:#3b82f6">...</span></p>
            <p>选择 <span style="background:white; color:black; padding: 2px 5px; border-radius: 4px;">在浏览器打开</span></p>
        </div>
    </div>

    <script>
        // 检测是否在微信或QQ内置浏览器中
        function isWeChatOrQQ() {
            var ua = navigator.userAgent.toLowerCase();
            return (ua.indexOf('micromessenger') !== -1 || ua.indexOf('qq/') !== -1);
        }

        const tipDiv = document.getElementById('weixinTip');
        const dlBtn = document.getElementById('dlBtn');

        if (isWeChatOrQQ()) {
            // 如果是微信或QQ，显示遮罩层
            tipDiv.style.display = 'block';
            
            // 点击遮罩层任意位置不关闭，必须引导用户去右上角
            tipDiv.addEventListener('click', function(e) {
                // 这里可以什么都不做，或者再次提示
            });
        } else {
            // 如果不是微信/QQ，确保遮罩隐藏
            tipDiv.style.display = 'none';
        }

        // 可选：点击下载按钮后的简单反馈
        dlBtn.addEventListener('click', function() {
            this.innerHTML = '下载请求已发送...';
            setTimeout(() => {
                this.innerHTML = '正在下载...';
            }, 1000);
        });
    </script>
</body>
</html>
